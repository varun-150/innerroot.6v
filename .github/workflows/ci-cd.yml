name: Inner Root CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-project/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./react-project
        run: npm ci

      - name: Run Build Check
        working-directory: ./react-project
        run: npm run build
        env:
          CI: true

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./inner-root-backend
        run: mvn -B package --file pom.xml -DskipTests

  deployment-check:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    steps:
      - name: Deployment Success
        run: echo "CI Build and Checks completed successfully!"
