services:
  - type: web
    name: inner-root-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080
      - fromGroup: inner-root-db-creds
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://your-netlify-url.netlify.app,https://your-vercel-url.vercel.app"
