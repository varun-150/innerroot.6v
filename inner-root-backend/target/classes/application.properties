# ---- PostgreSQL / Neon Configuration ----
# use environment variable for security or paste your full URI here
# e.g. export DATABASE_URL="postgresql://neondb_owner:npg_YPm4ykGloQs9@ep-bold-block-aiutmexl-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# The driver is inferred automatically, but can be forced if needed:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate will **not** create/alter tables itself when Flyway is in use.
# ddl-auto options: validate/check when using migrations, update/create for dev only
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Google OAuth ----
app.google.client-id=${GOOGLE_CLIENT_ID}


# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Logging
logging.level.com.innerroot=DEBUG
logging.level.org.springframework.security=DEBUG

# Flyway
spring.flyway.baseline-on-migrate=true

# ---- NVIDIA API ----
nvidia.api.key=${NVIDIA_API_KEY}
nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.api.model=meta/llama-3.1-8b-instruct
