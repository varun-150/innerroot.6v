server.port=${PORT:8080}


spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/innerrootdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Varun@150}
# The driver is inferred automatically, but can be forced if needed:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# Hibernate will **not** create/alter tables itself when Flyway is in use.
# ddl-auto options: validate/check when using migrations, update/create for dev only
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET:8Zz5tw0Ionm3XPZZfN0FkzAt63sWpC0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Google OAuth ----
app.google.client-id=${GOOGLE_CLIENT_ID:}


# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Logging
logging.level.com.innerroot=DEBUG
logging.level.org.springframework.security=DEBUG

# H2 Console (local dev only)
spring.h2.console.enabled=true

# Flyway — disabled for local H2 dev. Enable via env var in production.
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# ---- NVIDIA API ----
nvidia.api.key=${NVIDIA_API_KEY:}
nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.api.model=meta/llama-3.1-8b-instruct

# ---- Webhook (n8n/Automations) ----
app.webhook.n8n-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook-test/inner-root-events}
